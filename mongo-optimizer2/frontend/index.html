<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Query Optimizer</title>
    <style>
            
        :root {
            --primary: #00ed64;
            --dark: #001e2b;
            --light: #f8f9fa;
            --error: #ff4d4f;
            --border: #e6e6e6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #001e2b, #003b4f);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            margin-bottom: 25px;
            text-align: center;
            font-size: 28px;
            color: var(--dark);
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 237, 100, 0.2);
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00ed64, #00c853);
            color: #001e2b;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 237, 100, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #results {
            margin-top: 30px;
            display: none;
        }

        .card {
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            background: #fafafa;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 10px;
            color: var(--dark);
        }

        .issue {
            color: var(--error);
            font-weight: 600;
            margin-bottom: 5px;
        }

        pre {
            background: #0f172a;
            color: #00ed64;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin-top: 10px;
            font-size: 13px;
        }

        .hidden {
            display: none;
        }

        #loading {
            text-align: center;
            margin: 20px 0;
            font-weight: 600;
            color: #666;
        }
        body.dark {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #f1f5f9;
}

        body.dark .container {
            background: #0f172a;
            color: #f1f5f9;
        }

        body.dark input,
        body.dark textarea {
            background: #020617;
            color: #f1f5f9;
            border: 1px solid #334155;
        }

        body.dark input:focus,
        body.dark textarea:focus {
            box-shadow: 0 0 0 2px rgba(0, 237, 100, 0.3);
        }

        body.dark .card {
            background: #020617;
            border-color: #334155;
        }

        body.dark pre {
            background: #000;
            color: #00ed64;
        }

        body.dark h1,
        body.dark label {
            color: #f1f5f9;
        }
            
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
            <button id="themeToggle" style="width:auto; padding:8px 12px; font-size:13px;">
                🌙 Dark Mode
            </button>
        </div>
        <h1>MongoDB Query Optimizer</h1>
        <form id="optForm">
            <div class="form-group">
                <label>MongoDB URI</label>
                <input type="text" id="uri" value="mongodb://localhost:27017" required>
            </div>
            <div class="form-group">
                <label>Database</label>
                <input type="text" id="db" placeholder="test" required>
            </div>
            <div class="form-group">
                <label>Collection</label>
                <input type="text" id="coll" placeholder="users" required>
            </div>
            <div class="form-group">
                <label>Query (JSON)</label>
                <textarea id="query" rows="4" placeholder='{"age": {"$gt": 20}}' required></textarea>
            </div>
            <button type="submit" id="btn">Analyze Performance</button>
        </form>

        <div id="loading" class="hidden">Analyzing query...</div>

        <div id="results">
            <div class="card">
                <h3>Execution Analysis</h3>
                <div id="analysis"></div>
            </div>
            <div class="card">
                <h3>Detected Issues</h3>
                <div id="issues"></div>
            </div>
            <div class="card">
                <h3>Optimization Suggestion</h3>
                <div id="suggestion"></div>
            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById("themeToggle");

    toggleBtn.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
            toggleBtn.textContent = "☀️ Light Mode";
        } else {
            toggleBtn.textContent = "🌙 Dark Mode";
        }
    });

        document.getElementById('optForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            try {
                const queryStr = document.getElementById('query').value;
                let query;
                try {
                    query = JSON.parse(queryStr);
                } catch (err) {
                    throw new Error("Invalid JSON in Query field");
                }

                btn.disabled = true;
                loading.classList.remove('hidden');
                results.style.display = 'none';

                const res = await fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mongoUri: document.getElementById('uri').value,
                        database: document.getElementById('db').value,
                        collection: document.getElementById('coll').value,
                        query: query
                    })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || "Request failed");

                document.getElementById('analysis').innerHTML = `
                    <p>Time: <b>${data.analysis.executionTimeMillis}ms</b></p>
                    <p>Docs Examined: <b>${data.analysis.totalDocsExamined}</b></p>
                    <p>Scan Type: <b style="color: ${data.analysis.isFullScan ? 'red' : 'green'}">${data.analysis.winningPlanStage}</b></p>
                `;

                document.getElementById('issues').innerHTML = data.issues.length ? 
                    data.issues.map(i => `<p class="issue">Warning: ${i}</p>`).join('') : 
                    "<p>No major performance issues detected.</p>";

                document.getElementById('suggestion').innerHTML = data.suggestions.length ? 
                    data.suggestions.map(s => `
                        <p>${s.reason}</p>
                        <pre>db.${document.getElementById('coll').value}.createIndex(${JSON.stringify(s.index)})</pre>
                    `).join('') : 
                    "<p>No index suggestions for this query.</p>";

                results.style.display = 'block';
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
